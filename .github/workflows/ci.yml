name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    name: Build, Lint & Test (${{ matrix.os }})
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      - run: pnpm format:check
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm license-check
      - run: pnpm publish-check
      - run: pnpm test ${{ matrix.os == 'ubuntu-latest' && '-- -- --coverage' || '' }}
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  package:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    permissions:
      contents: read

    needs:
      - ci

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup

      - name: Build packages
        run: pnpm build

      - name: Build docs
        run: |
          command -v pandoc || (sudo apt-get update && sudo apt-get install -y pandoc)

          mkdir -p build/gh-pages
          pandoc \
            -f gfm -t html5 -s --shift-heading-level-by=-1 --lua-filter=gh-pages/filter.lua -H gh-pages/header.html \
            -o build/gh-pages/index.html gh-pages/metadata.md README.md

          pnpm --filter @qontoctl/core docs

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: build/gh-pages

  publish-github-pages:
    timeout-minutes: 10
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    needs:
      - package

    environment:
      name: github-pages
      url: ${{ steps.publish-github-pages.outputs.page_url }}

    steps:
      - name: Set up GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Publish GitHub Pages
        id: publish-github-pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  e2e-sandbox:
    name: E2E (Sandbox)
    timeout-minutes: 15
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    needs:
      - ci
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: pnpm test:e2e
        env:
          QONTOCTL_STAGING_TOKEN: ${{ secrets.QONTOCTL_STAGING_TOKEN }}
          QONTOCTL_CLIENT_ID: ${{ secrets.QONTOCTL_CLIENT_ID }}
          QONTOCTL_CLIENT_SECRET: ${{ secrets.QONTOCTL_CLIENT_SECRET }}
          QONTOCTL_ACCESS_TOKEN: ${{ secrets.QONTOCTL_ACCESS_TOKEN }}
          QONTOCTL_REFRESH_TOKEN: ${{ secrets.QONTOCTL_REFRESH_TOKEN }}

  ci-gate:
    name: CI
    if: always()
    permissions: {}
    needs:
      - ci
      - package
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: |
          if [[ "${{ needs.ci.result }}" != "success" ]]; then
            echo "CI failed: ${{ needs.ci.result }}"
            exit 1
          fi
          if [[ "${{ needs.package.result }}" != "success" ]]; then
            echo "Package failed: ${{ needs.package.result }}"
            exit 1
          fi
